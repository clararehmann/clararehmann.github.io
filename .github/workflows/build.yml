name: Build site from Markdown sources

on:
  push:
    paths:
      - 'content/**'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run build
        run: python3 build.py
      - name: Commit regenerated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.html index.html contact.html
          git diff --staged --quiet || git commit -m "chore: regenerate HTML from Markdown sources [skip ci]"
          git push
