<!DOCTYPE html>
<!-- art.html — Art portfolio page
     CONTENT FILE: edit the `slides` array below to add/update artwork.
     Use ◀ ▶ buttons or arrow keys to navigate.
     Image paths reference assets/img/design/ -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Portfolio — Clara Rehmann</title>
<link rel="stylesheet" href="mac-styles.css">
</head>
<body>

<!-- MENU BAR (populated by mac-components.js) -->
<div id="menubar"></div>

<!-- DESKTOP -->
<div id="desktop">

  <!-- Art Window -->
  <div class="window" id="art-window" style="left: 10px; top: 10px; width: calc(50vw - 90px);">
    <div class="window-titlebar" onmousedown="startDrag(event, 'art-window')">
      <div class="titlebar-btn" onclick="window.location.href='fun.html'" title="Close"></div>
      <div class="titlebar-btn" title="Zoom"></div>
      <div class="window-title">Art Portfolio</div>
    </div>
    <div class="window-toolbar">
      <button class="toolbar-btn" onclick="window.location.href='fun.html'">&#9664; Fun Stuff</button>
      <div class="toolbar-separator"></div>
      <button class="toolbar-btn" onclick="galleryPrev()">&#9664;</button>
      <button class="toolbar-btn" onclick="galleryNext()">&#9654;</button>
      <div class="toolbar-separator"></div>
      <button class="toolbar-btn" onclick="window.location.href='aeg.html'">Aeg</button>
    </div>
    <div class="window-content" style="height: calc(50vh - 112px);">
      <div class="finder-main gallery-viewer">
        <div id="gallery-slide" style="width:100%; text-align:center;"></div>
      </div>
    </div>
    <div class="window-statusbar">
      <span id="gallery-counter">1 / 7</span>
      <div class="statusbar-divider"></div>
      <span id="gallery-title">Art &amp; design work</span>
    </div>
    <div class="resize-handle"></div>
  </div>

</div>


<!-- ============================================================ -->
<!-- CONTENT — edit the `slides` array to add/update artwork      -->
<!-- Paths: assets/img/design/    -->
<!-- ============================================================ -->
<script>
const BASE = 'assets/img/design/';
const slides = [
  { title: 'Linocut prints and stickers for my defense', row: [
    { src: BASE + 'mosq.jpg' },
    { src: BASE + 'travelmosquito_sticker.png' },
    { src: BASE + 'uhaul_sticker.png' }
  ]
  },
  { title: 'EVO-WIBO 2025 logo',
    src: BASE + 'evowibo.png', alt: 'EVO-WIBO 2025' },
  { title: 'GrEBES Spring Seminar — 2025: How to Save a Rhinoceros',
    src: BASE + 'grebesseminar-25.png', alt: 'GrEBES Seminar 2025' },
  { title: 'GrEBES Spring Seminar — 2024: Lessons from Neanderthals',
    src: BASE + 'grebesseminar24-1.png', alt: 'GrEBES Seminar 2024' },
  { title: "GrEBES Spring Seminar — 2023: What's Inside a Cat's Head?",
    src: BASE + 'springseminar2023_printposter.png', alt: 'GrEBES Seminar 2023' },
  { title: '...and other event advertising', row: [
    { src: BASE + 'GREBEShalloween.png',      alt: 'GrEBES Halloween' },
    { src: BASE + 'scholarships2025.png',     alt: 'Scholarships 2025' },
    { src: BASE + 'postdocq&asocial.png',     alt: 'Postdoc Q&A Social' },
    { src: BASE + 'grebes-spiritweekF25.png', alt: 'Spirit Week F25' },
  ]},
  { title: 'The Lovers VI — line art',
    src: BASE + 'thelovers.PNG', alt: 'The Lovers VI' },
  { title: 'Self-portraits (2017, 2019, 2022)', row: [
    { src: BASE + 'sandiego.jpg',    alt: 'Self-portrait 2017' },
    { src: BASE + 'ucla.JPG',        alt: 'Self-portrait 2019' },
    { src: BASE + 'gradschool.JPG',  alt: 'Self-portrait 2022' },
  ]},
];
</script>
<!-- ============================================================ -->
<!-- END CONTENT                                                   -->
<!-- ============================================================ -->

<script>
let current = 0;

function renderSlide() {
  const s = slides[current];
  document.getElementById('gallery-counter').textContent = (current + 1) + ' / ' + slides.length;
  document.getElementById('gallery-title').textContent = s.title;

  let imgHtml;
  if (s.src) {
    imgHtml = `<img class="gallery-img" src="${s.src}" alt="${s.alt}">`;
  } else if (s.row) {
    imgHtml = `<div class="gallery-row">${s.row.map(i => `<img class="gallery-img" src="${i.src}" alt="${i.alt}">`).join('')}</div>`;
  } else if (s.rows) {
    imgHtml = s.rows.map(row =>
      `<div class="gallery-row">${row.map(i => `<img class="gallery-img" src="${i.src}" alt="${i.alt}">`).join('')}</div>`
    ).join('');
  }

  document.getElementById('gallery-slide').innerHTML =
    `<div class="gallery-slide-title">${s.title}</div>${imgHtml}`;
}

function galleryPrev() {
  current = (current - 1 + slides.length) % slides.length;
  renderSlide();
}

function galleryNext() {
  current = (current + 1) % slides.length;
  renderSlide();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft')  galleryPrev();
  if (e.key === 'ArrowRight') galleryNext();
});

renderSlide();
</script>

<script src="mac-components.js"></script>
<script>MacComponents.init({ page: 'art' });</script>
<script src="mac-chrome.js"></script>
</body>
</html>
